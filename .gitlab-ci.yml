# .gitlab-ci.yml
# ---------------------------------------------------------------------------
# Build and push Docker images using GitLab CI/CD
# Optimized for GitLab runners with Docker-in-Docker (DinD)
# ---------------------------------------------------------------------------
# Purpose:
# - Automates building and pushing Docker images for an R-based geospatial project
# - Uses rocker/geospatial:latest, providing R, RStudio, and geospatial libraries (GDAL, GEOS, PROJ)
# - Pushes images to GitLab Container Registry (git.ufz.de:4567) with commit-specific and 'latest' tags
# - Builds images using a Dockerfile with renv dependencies from scripts/renv_full.lock
# ---------------------------------------------------------------------------
# Key Features:
# - Builds images with commit-specific tags (e.g., $CI_COMMIT_REF_SLUG)
# - Pushes 'latest' tag for default branch (e.g., main)
# - Uses Docker-in-Docker (DinD) with TLS for secure Docker operations
# - Triggers on changes to Dockerfile, renv lockfile, or .gitlab-ci.yml
# - Installs Docker CLI (docker.io) for build/push operations
# - Ensures secure Docker login with credential cleanup
# - Includes debug output to troubleshoot registry access
# ---------------------------------------------------------------------------
# Prerequisites:
# - Enable Container Registry in GitLab project settings (Settings > General > Visibility)
# - Create a Deploy Token with read_registry and write_registry scopes (Settings > Repository > Deploy Tokens)
# - Set REGISTRY_USER and REGISTRY_PASSWORD as CI/CD variables (Settings > CI/CD > Variables, masked for password)
# - Configure GitLab Runner with 'privileged = true' in config.toml for docker:dind
# - Ensure runner has 'docker' tag and network access to git.ufz.de:4567
# - Save this file with UTF-8 encoding and Unix LF line endings to avoid parsing errors
# - Validate YAML syntax with yamllint or an online linter (e.g., yamlchecker.com)
# ---------------------------------------------------------------------------

docker-build:
  # Base image for the CI job, providing R, RStudio, and geospatial libraries
  image: rocker/geospatial:latest

  # Define the pipeline stage for job execution order
  stage: build

  # Services: Enable Docker-in-Docker (DinD) for building and pushing images
  services:
    - name: docker:dind
      alias: docker

  # Environment variables for Docker configuration and image naming
  variables:
    DOCKER_IMAGE_NAME: $CI_REGISTRY_IMAGE:$CI_COMMIT_REF_SLUG
    DOCKER_TLS_CERTDIR: /certs
    DOCKER_HOST: tcp://docker:2376
    DOCKER_TLS_VERIFY: "1"
    DOCKER_CERT_PATH: /certs/client
    DOCKER_DRIVER: overlay2

  # Before script: Set up environment and authenticate with GitLab Container Registry
  before_script:
    - set -euo pipefail
    - apt-get update -y && apt-get install -y docker.io
    - echo "CI_REGISTRY=$CI_REGISTRY, REGISTRY_USER=$REGISTRY_USER"
    - docker login -u "$REGISTRY_USER" -p "$REGISTRY_PASSWORD" "$CI_REGISTRY"
    - docker images
    - rm -f /root/.docker/config.json

  # Main script: Build and push the Docker image
script:
  # Build Docker image with metadata
  - echo "📦 Building Docker image: $IMAGE_TAG"
  - docker build \
      --build-arg renv_lock=scripts/renv_full.lock \
      --build-arg build_date="$(date +%Y-%m-%d)" \
      -t "$IMAGE_TAG" .

  # Push commit-specific image
  - echo "🚀 Pushing commit-specific image: $IMAGE_TAG"
  - docker push "$IMAGE_TAG"

  # Conditionally push 'latest' tag
  - >
    if [ "$CI_COMMIT_BRANCH" = "$CI_DEFAULT_BRANCH" ]; then
      echo "🏷️  On default branch ($CI_DEFAULT_BRANCH); tagging as latest";
      docker tag "$IMAGE_TAG" "$LATEST_TAG";
      docker push "$LATEST_TAG";
    else
      echo "ℹ️  Not on default branch; skipping 'latest' tag";
    fi

  # Rules: Define when the job runs
  rules:
    - exists:
        - Dockerfile
      changes:
        - scripts/renv_full.lock
        - Dockerfile
        - .gitlab-ci.yml
      when: always

  # Tags: Specify runner with Docker-in-Docker support
  tags:
    - docker
