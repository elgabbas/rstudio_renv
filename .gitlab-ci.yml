# .gitlab-ci.yml
# ---------------------------------------------------------------------------
# Build and push Docker images using GitLab CI/CD
# Optimized for GitLab shared runners with registry-based Docker layer caching
# ---------------------------------------------------------------------------
# Key Features:
# - Builds Docker images using rocker/geospatial as the base image
# - Utilizes GitLab Container Registry for image storage
# - Pushes commit-specific images based on the branch or tag name
# - Tags and pushes 'latest' image only from the default branch
# - Implements registry-based caching to accelerate build times
# ---------------------------------------------------------------------------

docker-build:
  # Base image for the CI runner job, providing R and geospatial tools
  image: rocker/geospatial:latest

  # Pipeline stage for this job
  stage: build

  services:
    # Docker-in-Docker service enables Docker commands within the job
    - docker:dind

  variables:
    # Docker image name, combining registry path and commit ref (branch/tag slug)
    DOCKER_IMAGE_NAME: $CI_REGISTRY_IMAGE:$CI_COMMIT_REF_SLUG

  before_script:
    # Configure shell: exit on errors, undefined variables, or pipeline failures
    - set -euo pipefail
    # Authenticate with GitLab Container Registry using CI/CD variables
    - echo "Logging into GitLab Container Registry..."
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"

  script: |
    # Announce the Docker image being built
    echo "Building Docker image: $DOCKER_IMAGE_NAME"
    # Build the image with R environment lock file and registry caching
    docker build \
      --build-arg renv_lock=scripts/renv_full.lock \
      --cache-from="$CI_REGISTRY_IMAGE:cache" \
      --cache-to=type=registry,ref="$CI_REGISTRY_IMAGE:cache",mode=max \
      -t "$DOCKER_IMAGE_NAME" \
      .

    # Push the commit-specific image to the registry
    echo "Pushing commit-specific image: $DOCKER_IMAGE_NAME"
    docker push "$DOCKER_IMAGE_NAME"

    # Check if on the default branch (e.g., main) to manage 'latest' tag
    echo "Checking if on default branch ($CI_DEFAULT_BRANCH)..."
    if [ "$CI_COMMIT_BRANCH" = "$CI_DEFAULT_BRANCH" ]; then
      echo "Tagging and pushing 'latest' image..."
      docker tag "$DOCKER_IMAGE_NAME" "$CI_REGISTRY_IMAGE:latest"
      docker push "$CI_REGISTRY_IMAGE:latest"
    else
      echo "Not on default branch; skipping push of 'latest' tag."
    fi

    # Tag and push a 'cache' image for layer caching in future builds
    echo "Pushing cache image: $CI_REGISTRY_IMAGE:cache"
    docker tag "$DOCKER_IMAGE_NAME" "$CI_REGISTRY_IMAGE:cache"
    docker push "$CI_REGISTRY_IMAGE:cache"

    # Log out from the registry to remove credentials from the runner
    docker logout "$CI_REGISTRY"

  rules:
    # Conditions to trigger this job:
    # - A Dockerfile must exist in the repository root
    # - Changes detected in the R lock file or Dockerfile
    - exists:
        - Dockerfile
      changes:
        - scripts/renv_full.lock
        - Dockerfile
      when: always
