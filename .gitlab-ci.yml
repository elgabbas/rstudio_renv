# .gitlab-ci.yml
# ---------------------------------------------------------------------------
# Build and push Docker images using GitLab CI/CD
# Optimized for simplicity on GitLab runners with Docker-in-Docker
# ---------------------------------------------------------------------------
# Purpose:
# - Automates building and pushing Docker images for an R-based geospatial project
# - Uses rocker/geospatial as the base image, which includes R and geospatial libraries
# - Integrates with GitLab Container Registry for secure image storage
# - Supports commit-specific image tags and 'latest' tag for the default branch
# - Designed to handle dependencies for the sdm R package via renv lockfile
# ---------------------------------------------------------------------------
# Key Features:
# - Builds images using a Dockerfile that restores dependencies from scripts/renv_full.lock
# - Pushes images tagged with the branch or tag name (e.g., $CI_COMMIT_REF_SLUG)
# - Tags and pushes 'latest' image only from the default branch (e.g., main)
# - Uses Docker-in-Docker (DinD) with TLS for secure Docker commands
# - Triggers automatically on changes to Dockerfile, renv lockfile, or .gitlab-ci.yml
# - Installs Docker CLI in the runner for Docker operations
# - Uses secure docker login with --password-stdin and credential cleanup
# ---------------------------------------------------------------------------

docker-build:
  # Base image for the CI job, providing R, geospatial libraries, and system dependencies
  image: rocker/geospatial:latest

  # Pipeline stage for organizing job execution order
  stage: build

  services:
    # Docker-in-Docker (DinD) service to provide a Docker daemon for building/pushing images
    # Alias 'docker' simplifies referencing in DOCKER_HOST
    - name: docker:dind
      alias: docker

  variables:
    # DOCKER_IMAGE_NAME: Defines the image name using GitLab registry path and commit ref slug
    # Example: git.ufz.de:4567/<group>/<project>:<branch-or-tag-slug>
    DOCKER_IMAGE_NAME: $CI_REGISTRY_IMAGE:$CI_COMMIT_REF_SLUG
    # DOCKER_TLS_CERTDIR: Directory for TLS certificates to secure DinD communication
    DOCKER_TLS_CERTDIR: "/certs"
    # DOCKER_HOST: Specifies the DinD service endpoint with TLS (port 2376)
    DOCKER_HOST: tcp://docker:2376
    # DOCKER_TLS_VERIFY: Enables TLS verification for secure Docker daemon access
    DOCKER_TLS_VERIFY: "1"
    # DOCKER_CERT_PATH: Path to TLS certificates for the Docker client
    DOCKER_CERT_PATH: "/certs/client"

  before_script:
    # Configure shell to exit on errors (-e), unset variables (-u), or pipeline failures (-o pipefail)
    - set -euo pipefail
    # Install Docker CLI in the rocker/geospatial image to enable Docker commands
    - apt-get update && apt-get install -y docker.io
    # Log in to GitLab Container Registry securely using --password-stdin
    - echo "Logging into GitLab Container Registry..."
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY"
    # Remove Docker config to avoid unencrypted credential storage
    - rm -f /root/.docker/config.json

  script: |
    # Print the Docker image name being built for traceability
    echo "Building Docker image: $DOCKER_IMAGE_NAME"
    # Build the image using the renv lockfile for R dependencies
    # --build-arg: Passes the renv lockfile path to the Dockerfile
    # -t: Tags the image with the commit-specific name
    docker build \
      --build-arg renv_lock=scripts/renv_full.lock \
      -t "$DOCKER_IMAGE_NAME" \
      .
    # Push the commit-specific image to the GitLab Container Registry
    echo "Pushing commit-specific image: $DOCKER_IMAGE_NAME"
    docker push "$DOCKER_IMAGE_NAME"
    # Conditionally tag and push 'latest' image if on the default branch (e.g., main)
    echo "Checking if on default branch ($CI_DEFAULT_BRANCH)..."
    if [ "$CI_COMMIT_BRANCH" = "$CI_DEFAULT_BRANCH" ]; then
      echo "Tagging and pushing 'latest' image..."
      docker tag "$DOCKER_IMAGE_NAME" "$CI_REGISTRY_IMAGE:latest"
      docker push "$CI_REGISTRY_IMAGE:latest"
    else
      echo "Not on default branch; skipping push of 'latest' tag."
    fi
    # Log out from the registry and remove config to ensure no credentials are stored
    docker logout "$CI_REGISTRY"
    rm -f /root/.docker/config.json

  rules:
    # Trigger conditions for the job:
    # - Requires a Dockerfile in the repository root
    # - Runs when changes are detected in:
    #   - scripts/renv_full.lock (R dependencies, including sdm::installAll() packages)
    #   - Dockerfile (image configuration)
    #   - .gitlab-ci.yml (pipeline configuration)
    - exists:
        - Dockerfile
      changes:
        - scripts/renv_full.lock
        - Dockerfile
        - .gitlab-ci.yml
      when: always
