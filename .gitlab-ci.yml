docker-build:
  # ... earlier parts omitted for brevity

  after_script:
    - echo "🔒 Logging out of container registry"
    - docker logout "$CI_REGISTRY"

  # -----------------------------------------------------------------------------
  # RULES: Define when this job should run
  # -----------------------------------------------------------------------------
  rules:
    # Rule 1: Only run if Dockerfile exists in repo root
    - exists:
        - Dockerfile

    # Rule 2: Run if any of these files change
    - changes:
        - Dockerfile
        - scripts/renv_full.lock
        - .gitlab-ci.yml

  # -----------------------------------------------------------------------------
  # TAGS: Specify which runner to use
  # -----------------------------------------------------------------------------
  tags:
    - docker  # Runner must support Docker-in-Docker
