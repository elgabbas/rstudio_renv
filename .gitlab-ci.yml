# .gitlab-ci.yml
# Build and push Docker images with GitLab CI/CD
# Works on shared runners with registry-based caching

docker-build:
  image: rocker/geospatial:latest
  stage: build

  services:
    - docker:dind

  variables:
    DOCKER_IMAGE_NAME: $CI_REGISTRY_IMAGE:$CI_COMMIT_REF_SLUG

  before_script:
    - set -euo pipefail
    - echo "Logging into GitLab Container Registry..."
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"

  script:
    # Build Docker image
    - echo "Building Docker image: $DOCKER_IMAGE_NAME"
    - docker build --build-arg renv_lock=scripts/renv_full.lock \
        --cache-from="$CI_REGISTRY_IMAGE:cache" \
        --cache-to=type=registry,ref="$CI_REGISTRY_IMAGE:cache",mode=max \
        -t "$DOCKER_IMAGE_NAME" .

    # Push commit-specific image
    - echo "Pushing commit-specific image: $DOCKER_IMAGE_NAME"
    - docker push "$DOCKER_IMAGE_NAME"

    # Push 'latest' tag only if on default branch
    - echo "Checking if on default branch..."
    - test "$CI_COMMIT_BRANCH" = "$CI_DEFAULT_BRANCH" && \
        echo "Pushing latest image..." && \
        docker tag "$DOCKER_IMAGE_NAME" "$CI_REGISTRY_IMAGE:latest" && \
        docker push "$CI_REGISTRY_IMAGE:latest" || \
        echo "Not on default branch; skipping latest push."

    # Push cache tag for layer caching
    - echo "Pushing cache image: $CI_REGISTRY_IMAGE:cache"
    - docker tag "$DOCKER_IMAGE_NAME" "$CI_REGISTRY_IMAGE:cache"
    - docker push "$CI_REGISTRY_IMAGE:cache"

  rules:
    - exists:
        - Dockerfile
      changes:
        - scripts/renv_full.lock
        - Dockerfile
      when: always
