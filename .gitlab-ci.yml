# ------------------------------------------------------------------------------
# .gitlab-ci.yml
#
# GitLab CI/CD pipeline for building and pushing Docker images for an R-based
# geospatial project using rocker/geospatial:latest as the base image.
#
# Prerequisites:
# - EITHER add REGISTRY_USER and REGISTRY_PASSWORD as variables in your project settings
# - OR use GitLab built-in CI_REGISTRY_USER and CI_REGISTRY_PASSWORD (recommended)
# ------------------------------------------------------------------------------

stages:
  - build

docker-build:
  image: rocker/geospatial:latest
  stage: build

  # If you see "Service docker:dind is already created", comment out the 'services:' block below.
  # If you do not control the runner, you may ignore the warning.
  services:
    - name: docker:dind
      alias: docker

  variables:
    DOCKER_IMAGE_NAME: $CI_REGISTRY_IMAGE:$CI_COMMIT_REF_SLUG
    DOCKER_TLS_CERTDIR: /certs
    DOCKER_HOST: tcp://docker:2376
    DOCKER_TLS_VERIFY: "1"
    DOCKER_CERT_PATH: /certs/client
    DOCKER_DRIVER: overlay2

  before_script:
    - 'set -euo pipefail'
    # Use GitLab CI's built-in registry credentials for login
    - 'echo "Debug: CI_REGISTRY=$CI_REGISTRY, CI_REGISTRY_USER=$CI_REGISTRY_USER"'
    - 'apt-get update -y && apt-get install -y docker.io'
    - 'docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"'
    - 'docker images'
    - 'rm -f /root/.docker/config.json'

  script:
    - 'echo "Building Docker image: $DOCKER_IMAGE_NAME"'
    - 'docker build --build-arg renv_lock=scripts/renv_full.lock --build-arg build_date="$(date +%Y-%m-%d)" -t "$DOCKER_IMAGE_NAME" .'
    - 'echo "Pushing commit-specific image: $DOCKER_IMAGE_NAME"'
    - 'docker push "$DOCKER_IMAGE_NAME"'
    - 'echo "Checking if on default branch ($CI_DEFAULT_BRANCH)..."'
    - |
      if [ "$CI_COMMIT_BRANCH" = "$CI_DEFAULT_BRANCH" ]; then
        echo "Tagging and pushing ''latest'' image"
        docker tag "$DOCKER_IMAGE_NAME" "$CI_REGISTRY_IMAGE:latest"
        docker push "$CI_REGISTRY_IMAGE:latest"
      else
        echo "Not on default branch; skipping ''latest'' tag"
      fi
    - 'docker logout "$CI_REGISTRY"'
    - 'rm -f /root/.docker/config.json'

  rules:
    - exists:
        - Dockerfile
      changes:
        - scripts/renv_full.lock
        - Dockerfile
        - .gitlab-ci.yml
      when: always

  tags:
    - docker
